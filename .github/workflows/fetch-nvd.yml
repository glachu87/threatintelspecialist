name: Fetch NVD Vulnerabilities

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-nvd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch NVD CVE data
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: python scripts/fetch_nvd.py

      - name: Commit and push
        run: |
          git config --global user.name 'TIS Bot'
          git config --global user.email 'bot@threatintelspecialist.com'
          git add feeds/nvd/vulnerabilities.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update NVD data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          # Retry push up to 5 times with pull --rebase between attempts
          for i in 1 2 3 4 5; do
            git push origin main && echo "Push succeeded on attempt $i" && exit 0
            echo "Push failed (attempt $i), pulling and retrying..."
            git pull --rebase origin main
          done
          echo "All push attempts failed"
          exit 1
