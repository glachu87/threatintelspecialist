name: Fetch NVD Vulnerabilities

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-nvd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch NVD CVE data
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: python scripts/fetch_nvd.py

      - name: Verify file was created
        run: |
          if [ ! -f feeds/nvd/vulnerabilities.json ]; then
            echo "ERROR: feeds/nvd/vulnerabilities.json was not created!"
            exit 1
          fi
          SIZE=$(wc -c < feeds/nvd/vulnerabilities.json)
          echo "File size: $SIZE bytes"
          if [ "$SIZE" -lt 100 ]; then
            echo "ERROR: File is too small, something went wrong"
            exit 1
          fi
          echo "✅ File verified"

      - name: Commit and push
        run: |
          git config --global user.name 'TIS Bot'
          git config --global user.email 'bot@threatintelspecialist.com'
          git add feeds/nvd/vulnerabilities.json
          git status
          git diff --staged --quiet && echo "No changes" || git commit -m "chore: update NVD data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
