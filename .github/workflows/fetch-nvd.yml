name: Fetch NVD Vulnerabilities
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch-nvd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Fetch NVD data
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: python scripts/fetch_nvd.py
      - name: Mirror to public/data
        run: |
          mkdir -p public/data
          cp feeds/nvd/vulnerabilities.json public/data/vulnerabilities.json
      - name: Commit & push vulnerabilities.json
        run: |
          git config --global user.name 'TIS NVD Bot'
          git config --global user.email 'bot@threatintelspecialist.com'
          git add feeds/nvd/vulnerabilities.json public/data/vulnerabilities.json
          git diff --staged --quiet || git commit -m "chore: update NVD vulnerabilities [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
