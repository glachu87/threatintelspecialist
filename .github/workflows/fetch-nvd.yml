name: Fetch NVD Vulnerabilities
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch-nvd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python scripts/fetch_nvd.py
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PUT repos/glachu87/threatintelspecialist/contents/feeds/nvd/vulnerabilities.json \
            --field message="update NVD data" \
            --field content="$(base64 -w 0 feeds/nvd/vulnerabilities.json)" \
            --field sha="$(gh api repos/glachu87/threatintelspecialist/contents/feeds/nvd/vulnerabilities.json --jq '.sha' 2>/dev/null || echo '')"
