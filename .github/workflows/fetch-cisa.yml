name: Fetch CISA feed

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch CISA KEV data
        run: python scripts/pull_feeds.py

      - name: Commit if changed
        run: |
          git config user.email "action@github.com"
          git config user.name "github-actions[bot]"
          git add feeds/cisa/advisories.json feeds/ncsc/advisories.json feeds/vt/advisories.json feeds/google/advisories.json
          git diff --staged --quiet || git commit -m "Update threat feeds [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
